<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>SUPER HUB 2003</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #000;
            color: #0f0;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: 40px;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 10px;
        }

        .marquee {
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            box-sizing: border-box;
            border: 3px dashed #ff0;
            padding: 5px 0;
            margin-bottom: 20px;
        }

        .marquee span {
            display: inline-block;
            padding-left: 100%;
            animation: scroll-text 10s linear infinite;
            font-weight: bold;
            color: #ff0;
        }

        @keyframes scroll-text {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .spin-text {
            display: inline-block;
            font-size: 18px;
            color: #0ff;
            margin-bottom: 20px;
            animation: spin 4s linear infinite;
            text-shadow: 0 0 5px #0ff;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .button {
            display: inline-block;
            margin: 20px;
            padding: 30px 50px;
            font-size: 26px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: 5px ridge #fff;
            border-radius: 8px;
            text-transform: uppercase;
            box-shadow: 0 0 20px #4CAF50;
            animation: pulse 1.2s infinite alternate;
        }

        .button.premium {
            background: #ff00ff;
            box-shadow: 0 0 25px #ff00ff;
        }

        .button.still {
            background: #0000ff;
            box-shadow: 0 0 25px #0000ff;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        .hint {
            margin-top: 30px;
            font-size: 14px;
            color: #f00;
            text-shadow: 0 0 4px #f00;
            animation: blink 0.7s steps(1) infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle, #0f0 1px, transparent 1px),
                radial-gradient(circle, #0ff 1px, transparent 1px);
            background-size: 80px 80px, 130px 130px;
            opacity: 0.35;
            animation: star-move 20s linear infinite;
            z-index: -1;
        }

        @keyframes star-move {
            0% { transform: translate(0,0); }
            100% { transform: translate(-80px,-80px); }
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <h1>WITAJ W SUPER HUBIE</h1>

    <div class="marquee">
        <span>UWAGA! KOSMICZNY HUB PRZEGLĄDARKI GIER PYTHON!!! UWAGA! KOSMICZNY HUB PRZEGLĄDARKI GIER PYTHON!!!</span>
    </div>

    <div class="spin-text">
        OBRACAM SIĘ, WIĘC TO NA PEWNO JEST PROFESJONALNE
    </div>

    <div>
        <button class="button premium"
                onclick="location.href='https://dawcio232.github.io/1-python-game/premium'">
            PREMIUM
        </button>

        <button class="button still"
                onclick="location.href='https://dawcio232.github.io/1-python-game/still'">
            STILL
        </button>
    </div>

    <div class="hint">
        KLIKNIJ COŚ, ZANIM PRZEGLĄDARKA WYBUCHNIE
    </div>
</body>
</html>
